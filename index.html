<body>
<div class="sidebar">
    <h1>🧭 TSP Маршруты <span style="font-size:10px">с адресами</span></h1>
    <div class="note">📍 Клик на карту / ввод адреса → добавить точку</div>
    <div class="grid">
        <div class="card"><div class="value" id="totalPoints">0</div><div class="label">📍 Точек</div></div>
        <div class="card"><div class="value" id="totalDist">—</div><div class="label">📏 Длина (км)</div></div>
        <div class="card"><div class="value" id="accuracyVal">—</div><div class="label">🎯 Точность</div></div>
        <div class="card"><div class="value" id="totalTime">—</div><div class="label">⏱️ Время (мс)</div></div>
    </div>
    <div class="control-group"><label>🔍 Добавить по адресу:</label><div class="address-input"><input type="text" id="addressInput" placeholder="Москва, Красная площадь" onkeypress="if(event.key==='Enter')geocodeAddress()"><button id="geocodeBtn" class="btn-success">📍 Найти</button></div></div>
    <div class="control-group"><label>🌍 Режим расстояния:</label><div class="mode-buttons"><button id="modeEuclid" class="mode-btn active">📏 Евклидово</button><button id="modeManhattan" class="mode-btn">📐 Манхэттен</button></div></div>
    <div class="control-group"><label>🎯 Режим оптимизации:</label><div class="mode-buttons"><button id="modeFast" class="mode-btn active">⚡ FAST (жадный)</button><button id="modeAccurate" class="mode-btn">🎯 ACCURATE (2-opt)</button></div></div>
    <div class="mode-buttons"><button id="runBtn" class="btn-primary" style="flex:2">🚀 ОПТИМИЗИРОВАТЬ</button><button id="clearBtn" class="btn-danger" style="flex:1">🗑️ ВСЕ</button></div>
    <div class="control-group"><label>📋 Список точек (кликните для удаления):</label><div class="points-list" id="pointsList"><div style="color:#666;text-align:center">Нет точек</div></div></div>
    <div class="result-line"><span class="label">📊 Статус:</span><span class="value" id="status">Готов</span></div>
    <div class="result-line"><span class="label">📐 Нижняя граница (MST):</span><span class="value" id="lowerBound">—</span></div>
    <div class="result-line"><span class="label">📈 Отклонение от MST:</span><span class="value" id="deviation">—</span></div>
    <div class="result-line"><span class="label">💡 Оценка точности:</span><span class="value" id="realEstimate">—</span></div>
</div>
<div class="map-container"><div id="map"></div></div>
